name: Lint

on:
    pull_request:
        branches: [dev]
        types: [opened, edited, synchronize, reopened, ready_for_review]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    eslint-vue:
        name: ESLint (Vue)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint
